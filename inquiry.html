<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="inquiry.css">
    <title>UNTITLE　お問い合わせフォーム</title>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="logo-title">
            <img src="images/logo.png" alt="UNTITLE logo" class="logo">
            <h1 class="site-title"><a href="#">UNTITLE</a></h1>
        </div>
        <div class="hamburger">☰</div>
        <nav class="site-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#works">Works</a></li>
                <li><a href="index.html#news">News</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="contact-form">

        <p class="title">お問い合わせフォーム</p>

        <form action="" method="post">
            <div class="item">
                <label for="" class="label">お名前</label>
                <input type="text" class="inputs" name="name" required>  
            </div>

            <div class="item">
                <label for="" class="label">メールアドレス</label>
                <input type="email" class="inputs" name="email" required>  
            </div>

            <div class="item">
                <p class="label">お問い合わせ<br>種別選択</p>
                <div class="inputs">
                    <input type="radio" name="menu" id="production" value="production"> <label for="production">
                        制作のご相談</label>

                    <input type="radio" name="menu" id="estimate" value="estimate"> <label for="estimate">
                        見積り依頼</label>

                    <input type="radio" name="menu" id="others" value="others"> <label for="others">
                        その他</label>

                </div>
            </div>

            <div class="item">
                <label for="" class="label">お問い合わせ<br>内容</label>
                <textarea name="" id="" class="inputs" placeholder="お問い合わせ内容をご記入ください"></textarea>
            </div>

            <div class="button-area">
                <input type="submit" value="送信する">
                <input type="reset" value="リセット">

            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
